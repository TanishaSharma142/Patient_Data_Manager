name: ivf_app
description: IVF Patient Data Management Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP and networking
  http: ^1.1.0
  
  # State management
  provider: ^6.0.0
  
  # Secure storage
  flutter_secure_storage: ^9.0.0
  
  # UI & Navigation
  go_router: ^10.0.0
  
  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^5.0.0
  
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: any

flutter:
  uses-material-design: true
  
  